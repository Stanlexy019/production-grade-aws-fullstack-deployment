name: Backend CI

on:
  push:
    branches: [ "main" ]
    paths:
      - "backend/**"

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::969759464709:role/github-actions-ecr-role
          aws-region: eu-north-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: docker build -t backend ./backend

      - name: Tag image
        run: |
          docker tag backend:latest \
          969759464709.dkr.ecr.eu-north-1.amazonaws.com/production-grade-aws-fullstack-backend:latest

      - name: Push image
        run: |
          docker push 969759464709.dkr.ecr.eu-north-1.amazonaws.com/production-grade-aws-fullstack-backend:latest